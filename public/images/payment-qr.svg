<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#FFF9F2" rx="16"/>
  <rect x="20" y="20" width="260" height="260" fill="none" stroke="#D4AF37" stroke-width="2" rx="8" stroke-dasharray="8 4"/>
  
  <!-- QR placeholder pattern -->
  <g fill="#0F0F0F">
    <rect x="40" y="40" width="60" height="60"/>
    <rect x="50" y="50" width="40" height="40" fill="#FFF9F2"/>
